AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: atrox-get-entity-api

Parameters:
  AuditQueueUrl:
    Type: String
    Default: ""
  AuditQueueArn:
    Type: String
    Default: "*"
  PgHost:
    Type: String
  PgPort:
    Type: String
    Default: "5432"
  PgDatabase:
    Type: String
  PgUser:
    Type: String
  PgPassword:
    Type: String
    NoEcho: true
  PgSslMode:
    Type: String
    Default: require
  VpcSubnetIds:
    Type: CommaDelimitedList
  VpcSecurityGroupIds:
    Type: CommaDelimitedList

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures:
      - x86_64
    Tracing: Active
  Api:
    OpenApiVersion: 3.0.1

Resources:
  GetEntityApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: atrox-get-entity-api-gateway
      StageName: Prod
      Auth:
        ApiKeyRequired: true
  GetEntityApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: atrox-get-entity-api
      CodeUri: .
      Handler: entity.entrypoint/lambda/api-handler.handler
      Environment:
        Variables:
          LOG_LEVEL: info
          LOG_SERVICE_NAME: atrox-get-entity-api
          ENABLE_DEBUG_REQUEST_RESPONSE: false
          AUDIT_QUEUE_URL: !Ref AuditQueueUrl
          PGHOST: !Ref PgHost
          PGPORT: !Ref PgPort
          PGDATABASE: !Ref PgDatabase
          PGUSER: !Ref PgUser
          PGPASSWORD: !Ref PgPassword
          PGSSLMODE: !Ref PgSslMode
      VpcConfig:
        SubnetIds: !Ref VpcSubnetIds
        SecurityGroupIds: !Ref VpcSecurityGroupIds
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !Ref AuditQueueArn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref GetEntityApiGateway
            Path: /entity/get
            Method: post
  GetEntityQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: atrox-get-entity-queue
      VisibilityTimeout: 30
  GetEntityTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: atrox-get-entity-topic
  GetEntitySqsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: atrox-get-entity-sqs
      CodeUri: .
      Handler: entity.entrypoint/lambda/sqs-handler.handler
      Environment:
        Variables:
          LOG_LEVEL: info
          LOG_SERVICE_NAME: atrox-get-entity-api
          ENABLE_DEBUG_REQUEST_RESPONSE: false
          AUDIT_QUEUE_URL: !Ref AuditQueueUrl
          PGHOST: !Ref PgHost
          PGPORT: !Ref PgPort
          PGDATABASE: !Ref PgDatabase
          PGUSER: !Ref PgUser
          PGPASSWORD: !Ref PgPassword
          PGSSLMODE: !Ref PgSslMode
      VpcConfig:
        SubnetIds: !Ref VpcSubnetIds
        SecurityGroupIds: !Ref VpcSecurityGroupIds
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !Ref AuditQueueArn
      Events:
        Queue:
          Type: SQS
          Properties:
            Queue: !GetAtt GetEntityQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures
  GetEntitySnsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: atrox-get-entity-sns
      CodeUri: .
      Handler: entity.entrypoint/lambda/sns-handler.handler
      Environment:
        Variables:
          LOG_LEVEL: info
          LOG_SERVICE_NAME: atrox-get-entity-api
          ENABLE_DEBUG_REQUEST_RESPONSE: false
          AUDIT_QUEUE_URL: !Ref AuditQueueUrl
          PGHOST: !Ref PgHost
          PGPORT: !Ref PgPort
          PGDATABASE: !Ref PgDatabase
          PGUSER: !Ref PgUser
          PGPASSWORD: !Ref PgPassword
          PGSSLMODE: !Ref PgSslMode
      VpcConfig:
        SubnetIds: !Ref VpcSubnetIds
        SecurityGroupIds: !Ref VpcSecurityGroupIds
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !Ref AuditQueueArn
      Events:
        Topic:
          Type: SNS
          Properties:
            Topic: !Ref GetEntityTopic
  GetEntityApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: atrox-get-entity-api-key
      Enabled: true
  GetEntityUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - GetEntityApiGatewayProdStage
    Properties:
      UsagePlanName: atrox-get-entity-usage-plan
      Throttle:
        BurstLimit: 40
        RateLimit: 20
      Quota:
        Limit: 100000
        Period: MONTH
      ApiStages:
        - ApiId: !Ref GetEntityApiGateway
          Stage: Prod
  GetEntityUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    DependsOn:
      - GetEntityUsagePlan
      - GetEntityApiKey
    Properties:
      KeyId: !Ref GetEntityApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref GetEntityUsagePlan

Outputs:
  GetEntityApiUrl:
    Value: !Sub https://${GetEntityApiGateway}.execute-api.${AWS::Region}.amazonaws.com/Prod/entity/get
  GetEntityApiKeyId:
    Value: !Ref GetEntityApiKey
