AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: atrox-delete-entity-api

Parameters:
  AuditQueueUrl:
    Type: String
    Default: ""
  AuditQueueArn:
    Type: String
    Default: "*"
  PgHost:
    Type: String
  PgPort:
    Type: String
    Default: "5432"
  PgDatabase:
    Type: String
  PgUser:
    Type: String
  PgPassword:
    Type: String
    NoEcho: true
  PgSslMode:
    Type: String
    Default: require
  VpcSubnetIds:
    Type: CommaDelimitedList
  VpcSecurityGroupIds:
    Type: CommaDelimitedList
  IdempotencyApiUrl:
    Type: String
    Default: ""
  IdempotencyRequestIdHeader:
    Type: String
    Default: x-idempotency-key

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures:
      - x86_64
    Tracing: Active
  Api:
    OpenApiVersion: 3.0.1

Resources:
  DeleteEntityApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: atrox-delete-entity-api-gateway
      StageName: Prod
      Auth:
        ApiKeyRequired: true
  DeleteEntityApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: atrox-delete-entity-api
      CodeUri: .
      Handler: entity.entrypoint/lambda/api-handler.handler
      Environment:
        Variables:
          LOG_LEVEL: info
          LOG_SERVICE_NAME: atrox-delete-entity-api
          ENABLE_DEBUG_REQUEST_RESPONSE: false
          AUDIT_QUEUE_URL: !Ref AuditQueueUrl
          IDEMPOTENCY_API_URL: !Ref IdempotencyApiUrl
          IDEMPOTENCY_REQUEST_ID_HEADER: !Ref IdempotencyRequestIdHeader
          PGHOST: !Ref PgHost
          PGPORT: !Ref PgPort
          PGDATABASE: !Ref PgDatabase
          PGUSER: !Ref PgUser
          PGPASSWORD: !Ref PgPassword
          PGSSLMODE: !Ref PgSslMode
      VpcConfig:
        SubnetIds: !Ref VpcSubnetIds
        SecurityGroupIds: !Ref VpcSecurityGroupIds
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !Ref AuditQueueArn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref DeleteEntityApiGateway
            Path: /entity/delete
            Method: delete
  DeleteEntityQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: atrox-delete-entity-queue
      VisibilityTimeout: 30
  DeleteEntityTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: atrox-delete-entity-topic
  DeleteEntitySqsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: atrox-delete-entity-sqs
      CodeUri: .
      Handler: entity.entrypoint/lambda/sqs-handler.handler
      Environment:
        Variables:
          LOG_LEVEL: info
          LOG_SERVICE_NAME: atrox-delete-entity-api
          ENABLE_DEBUG_REQUEST_RESPONSE: false
          AUDIT_QUEUE_URL: !Ref AuditQueueUrl
          IDEMPOTENCY_API_URL: !Ref IdempotencyApiUrl
          IDEMPOTENCY_REQUEST_ID_HEADER: !Ref IdempotencyRequestIdHeader
          PGHOST: !Ref PgHost
          PGPORT: !Ref PgPort
          PGDATABASE: !Ref PgDatabase
          PGUSER: !Ref PgUser
          PGPASSWORD: !Ref PgPassword
          PGSSLMODE: !Ref PgSslMode
      VpcConfig:
        SubnetIds: !Ref VpcSubnetIds
        SecurityGroupIds: !Ref VpcSecurityGroupIds
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !Ref AuditQueueArn
      Events:
        Queue:
          Type: SQS
          Properties:
            Queue: !GetAtt DeleteEntityQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures
  DeleteEntitySnsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: atrox-delete-entity-sns
      CodeUri: .
      Handler: entity.entrypoint/lambda/sns-handler.handler
      Environment:
        Variables:
          LOG_LEVEL: info
          LOG_SERVICE_NAME: atrox-delete-entity-api
          ENABLE_DEBUG_REQUEST_RESPONSE: false
          AUDIT_QUEUE_URL: !Ref AuditQueueUrl
          IDEMPOTENCY_API_URL: !Ref IdempotencyApiUrl
          IDEMPOTENCY_REQUEST_ID_HEADER: !Ref IdempotencyRequestIdHeader
          PGHOST: !Ref PgHost
          PGPORT: !Ref PgPort
          PGDATABASE: !Ref PgDatabase
          PGUSER: !Ref PgUser
          PGPASSWORD: !Ref PgPassword
          PGSSLMODE: !Ref PgSslMode
      VpcConfig:
        SubnetIds: !Ref VpcSubnetIds
        SecurityGroupIds: !Ref VpcSecurityGroupIds
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !Ref AuditQueueArn
      Events:
        Topic:
          Type: SNS
          Properties:
            Topic: !Ref DeleteEntityTopic
  DeleteEntityApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: atrox-delete-entity-api-key
      Enabled: true
  DeleteEntityUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - DeleteEntityApiGatewayProdStage
    Properties:
      UsagePlanName: atrox-delete-entity-usage-plan
      Throttle:
        BurstLimit: 10
        RateLimit: 5
      Quota:
        Limit: 25000
        Period: MONTH
      ApiStages:
        - ApiId: !Ref DeleteEntityApiGateway
          Stage: Prod
  DeleteEntityUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    DependsOn:
      - DeleteEntityUsagePlan
      - DeleteEntityApiKey
    Properties:
      KeyId: !Ref DeleteEntityApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref DeleteEntityUsagePlan

Outputs:
  DeleteEntityApiUrl:
    Value: !Sub https://${DeleteEntityApiGateway}.execute-api.${AWS::Region}.amazonaws.com/Prod/entity/delete
  DeleteEntityApiKeyId:
    Value: !Ref DeleteEntityApiKey
